<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gülsüm'e Doğum Günü Sürprizi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffb6e6,#8fd3ff);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Kalpler */
.heart{
position:absolute;
font-size:25px;
animation:float 10s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
}
100%{
transform:translateY(-100px) scale(1.5);
}
}

.container{
text-align:center;
color:white;
z-index:2;
padding:20px;
max-width:900px;
}

h1{
font-size:55px;
text-shadow:0 0 15px pink;
margin-bottom:30px;
animation:pulse 2s infinite;
}

h2{
margin-bottom:25px;
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}

button{
padding:15px 35px;
border:none;
border-radius:30px;
font-size:20px;
cursor:pointer;
background:white;
color:#ff4da6;
font-weight:bold;
transition:.3s;
margin:10px;
}

button:hover{
transform:scale(1.1);
}

#secondPage,
#thirdPage{
display:none;
}

.option-btn{
background:#ff69b4;
color:white;
}
</style>
</head>

<body>

<div id="hearts"></div>

<!-- İlk ekran -->
<div class="container" id="firstPage">

<h1>
🌸 İyi ki doğdun Gülsüm, dünyayı güzelleştirmenin 13. yılı kutlu olsun 🎉💖
</h1>

<button onclick="nextPage()">
Teşekkür ederim 💖
</button>

</div>


<!-- İkinci ekran -->
<div class="container" id="secondPage">

<h1>Pasta 🎂</h1>

<h2>
Doğum gününde buluştuğumuzda sana ne vereyim?
</h2>

<button class="option-btn" onclick="finish()">
🎂🌸 Pasta ve Çiçek
</button>

<button class="option-btn" onclick="finish()">
🎂🌸 Pasta ve Çiçek
</button>

</div>


<!-- Son ekran -->
<div class="container" id="thirdPage">

<h1>
🎉 Doğum Günün Tekrardan Kutlu Olsun Gülsüm 💖🎂
</h1>

<h2>
😎 Buluşmada görüşürüz o zaman 😎
</h2>

</div>


<script>

function nextPage(){
document.getElementById("firstPage").style.display="none";
document.getElementById("secondPage").style.display="block";
}

function finish(){
document.getElementById("secondPage").style.display="none";
document.getElementById("thirdPage").style.display="block";
}


const hearts=document.getElementById("hearts");

for(let i=0;i<40;i++){

let heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML=Math.random()>0.5 ? "💖" : "💙";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=
(Math.random()*5+5)+"s";

heart.style.fontSize=
(Math.random()*30+20)+"px";

hearts.appendChild(heart);

}

</script>

</body>
</html>
